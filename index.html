<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Burak'ın Web İmparatorluğu</title>
    <style>
        body { margin: 0; background: #0a0a0c; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; background: #15151a; margin: 0 auto; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; pointer-events: none; }
        .score-box { background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 20px; border: 2px solid #fdb912; display: inline-block; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui">
    <div class="score-box">
        <span style="color: #fdb912;">GS: <span id="p-score">0</span></span> | 
        <span style="color: #00d2ff;">BOT: <span id="e-score">0</span></span>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const pScoreTxt = document.getElementById('p-score');
    const eScoreTxt = document.getElementById('e-score');

    // Ayarlar
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const gridCount = 25;
    const cellSize = Math.min(canvas.width, canvas.height) / gridCount;
    const offsetX = (canvas.width - (gridCount * cellSize)) / 2;
    const offsetY = (canvas.height - (gridCount * cellSize)) / 2;

    // Harita: 0: Boş, 1: Burak(GS), 2: Bot
    let grid = [];
    for(let y=0; y<gridCount; y++) {
        grid[y] = [];
        for(let x=0; x<gridCount; x++) {
            grid[y][x] = { owner: 0, power: 0, isWater: Math.random() < 0.1 };
        }
    }

    // Başlangıçlar
    grid[2][2] = { owner: 1, power: 100, isWater: false };
    grid[gridCount-3][gridCount-3] = { owner: 2, power: 100, isWater: false };

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let pTotal = 0, eTotal = 0;

        for(let y=0; y<gridCount; y++) {
            for(let x=0; x<gridCount; x++) {
                const cell = grid[y][x];
                const px = offsetX + x * cellSize;
                const py = offsetY + y * cellSize;

                if(cell.isWater) ctx.fillStyle = '#1e2d3c';
                else if(cell.owner === 1) { ctx.fillStyle = '#a90432'; pTotal += cell.power; }
                else if(cell.owner === 2) { ctx.fillStyle = '#0074e4'; eTotal += cell.power; }
                else ctx.fillStyle = '#2a2a2e';

                ctx.fillRect(px, py, cellSize - 1, cellSize - 1);
                
                // GS Sarısı Çerçeve (Sadece oyuncu için)
                if(cell.owner === 1) {
                    ctx.strokeStyle = '#fdb912';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(px, py, cellSize - 1, cellSize - 1);
                }
            }
        }
        pScoreTxt.innerText = Math.floor(pTotal);
        eScoreTxt.innerText = Math.floor(eTotal);
        requestAnimationFrame(draw);
    }

    // Saldırı Mekaniği
    function attack(tx, ty, attacker) {
        if(grid[ty][tx].isWater) return;
        
        let bestNeighbor = null;
        let maxPower = 0;
        [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dy, dx]) => {
            let ny = ty+dy, nx = tx+dx;
            if(ny>=0 && ny<gridCount && nx>=0 && nx<gridCount) {
                if(grid[ny][nx].owner === attacker && grid[ny][nx].power > maxPower) {
                    maxPower = grid[ny][nx].power;
                    bestNeighbor = grid[ny][nx];
                }
            }
        });

        if(maxPower > 10) {
            let move = maxPower * 0.7;
            bestNeighbor.power -= move;
            if(grid[ty][tx].owner !== attacker) {
                grid[ty][tx].power -= move;
                if(grid[ty][tx].power < 0) {
                    grid[ty][tx].power = Math.abs(grid[ty][tx].power);
                    grid[ty][tx].owner = attacker;
                }
            } else {
                grid[ty][tx].power += move;
            }
        }
    }

    // Tıklama / Dokunma
    window.addEventListener('pointerdown', e => {
        const x = Math.floor((e.clientX - offsetX) / cellSize);
        const y = Math.floor((e.clientY - offsetY) / cellSize);
        if(x>=0 && x<gridCount && y>=0 && y<gridCount) attack(x, y, 1);
    });

    // Ekonomi (Interest) ve Bot
    setInterval(() => {
        grid.forEach(row => row.forEach(c => { if(c.owner > 0) c.power = Math.min(c.power * 1.02 + 0.5, 500); }));
        // Bot Hamlesi
        let rx = Math.floor(Math.random()*gridCount);
        let ry = Math.floor(Math.random()*gridCount);
        attack(rx, ry, 2);
    }, 500);

    draw();
</script>
</body>
</html>
