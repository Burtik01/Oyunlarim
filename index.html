<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burak'ın Dijital Dünyası</title>
    <style>
        :root { --sari: #fdb912; --kirmizi: #a90432; --koyu: #121212; }
        body { background-color: var(--koyu); color: white; font-family: sans-serif; text-align: center; margin: 0; }
        header { background: linear-gradient(135deg, var(--kirmizi), var(--sari)); padding: 50px 20px; }
        h1 { margin: 0; font-size: 2.5em; letter-spacing: 2px; }
        .container { padding: 40px 20px; }
        .proje-kart { 
            background: #1e1e1e; border: 2px solid var(--sari); border-radius: 15px; 
            padding: 25px; max-width: 500px; margin: 20px auto;
        }
        button { 
            background-color: var(--kirmizi); color: white; border: none; 
            padding: 12px 25px; border-radius: 25px; font-weight: bold; cursor: pointer;
        }
        .footer { margin-top: 50px; color: #666; font-size: 0.8em; }
    </style>
</head>
<body>

<header>
    <h1>BURAK'IN DÜNYASI</h1>
    <p>Geleceğin Yazılım Mimarı & Oyun Geliştiricisi</p>
</header>

<div class="container">
    <div class="proje-kart">
        <h3>Clash Royale: Pro Edition</h3>
        <p>Python ve Pydroid kullanarak geliştirdiğim strateji oyunu.</p>
        <button onclick="alert('Kodlar GitHub depomda yüklü!')">Projeyi Gör</button>
    </div>

    <div class="proje-kart">
        <h3>Hakkımda</h3>
        <p>Merhaba! Ben Burak. Python ile oyunlar yapmayı ve web teknolojilerini keşfetmeyi seviyorum.</p>
    </div>
</div>

<div class="footer">
    <p>© 2026 Burak - Tüm Hakları Saklıdır.</p>
</div>

</body>
</html>
