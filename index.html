<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Burak'ın Turbo Fetih Dünyası</title>
    <style>
        body { margin: 0; background: #050508; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; background: #0a0a0f; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; padding: 10px; z-index: 10; }
        .score-box { background: rgba(0,0,0,0.85); padding: 8px 15px; border-radius: 12px; border: 2px solid #fdb912; display: inline-block; font-size: 1.1em; }
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 30px; border-radius: 20px; border: 4px solid #fdb912; text-align: center; z-index: 100; }
        .map-btn { background: #a90432; color: #fdb912; border: 2px solid #fdb912; padding: 15px 30px; margin: 10px; font-size: 1.3em; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui">
    <div class="score-box">
        <span style="color: #fdb912;">BURAK (GS) 🦁: <span id="p-score">0</span></span> | 
        <span style="color: #00d2ff;">RAKİPLER: <span id="e-score">0</span></span>
    </div>
</div>

<div id="menu">
    <h1 style="color:#fdb912">TURBO MODU AKTİF! 🚀</h1>
    <button class="map-btn" onclick="startGame('klasik')">KLASİK SAVAŞ</button><br>
    <button class="map-btn" onclick="startGame('dunya')">DEV KITA</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const menu = document.getElementById('menu');
    const pScoreTxt = document.getElementById('p-score');
    const eScoreTxt = document.getElementById('e-score');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const gridCount = 40; 
    const cellSize = Math.min(canvas.width, canvas.height) / gridCount;
    const offsetX = (canvas.width - (gridCount * cellSize)) / 2;
    const offsetY = (canvas.height - (gridCount * cellSize)) / 2;

    let grid = [];
    let gameActive = false;

    function startGame(mapType) {
        menu.style.display = 'none';
        gameActive = true;
        initGrid(mapType);
        requestAnimationFrame(gameLoop);
    }

    function initGrid(mapType) {
        grid = [];
        for(let y=0; y<gridCount; y++) {
            grid[y] = [];
            for(let x=0; x<gridCount; x++) {
                let isWater = false;
                if(mapType === 'dunya') {
                    let d = Math.sqrt(Math.pow(x-gridCount/2, 2) + Math.pow(y-gridCount/2, 2));
                    isWater = d > (gridCount * 0.45);
                }
                grid[y][x] = { owner: 0, power: 0, isWater: isWater };
            }
        }
        // Oyuncular ve Botlar (Güçlü Başlangıç)
        grid[5][5] = { owner: 1, power: 500, isWater: false }; 
        grid[gridCount-6][gridCount-6] = { owner: 2, power: 500, isWater: false };
        grid[gridCount-6][5] = { owner: 3, power: 500, isWater: false };
    }

    function handleAction(tx, ty, attackerId) {
        if(!grid[ty] || !grid[ty][tx] || grid[ty][tx].isWater) return;
        
        let bestSource = null, maxPower = 0;
        // Etrafındaki en güçlü karesini bul
        [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dy, dx]) => {
            let ny=ty+dy, nx=tx+dx;
            if(grid[ny] && grid[ny][nx] && grid[ny][nx].owner === attackerId) {
                if(grid[ny][nx].power > maxPower) {
                    maxPower = grid[ny][nx].power;
                    bestSource = grid[ny][nx];
                }
            }
        });

        if(maxPower > 20) {
            let sendAmount = maxPower * 0.85; 
            bestSource.power -= sendAmount;
            if(grid[ty][tx].owner !== attackerId) {
                grid[ty][tx].power -= sendAmount;
                if(grid[ty][tx].power < 0) {
                    grid[ty][tx].power = Math.abs(grid[ty][tx].power);
                    grid[ty][tx].owner = attackerId;
                }
            } else {
                grid[ty][tx].power += sendAmount;
            }
        }
    }

    // Tıklama
    window.addEventListener('pointerdown', e => {
        const x = Math.floor((e.clientX - offsetX) / cellSize);
        const y = Math.floor((e.clientY - offsetY) / cellSize);
        if(gameActive) handleAction(x, y, 1);
    });

    // Ana Döngü
    function gameLoop() {
        if(!gameActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let pTotal = 0, eTotal = 0;

        for(let y=0; y<gridCount; y++) {
            for(let x=0; x<gridCount; x++) {
                const cell = grid[y][x];
                if(cell.owner > 0) {
                    // TURBO BÜYÜME: Her kare kendi kendine hızlıca artar
                    cell.power = Math.min(cell.power * 1.03 + 5, 5000);
                    if(cell.owner === 1) pTotal += cell.power; else eTotal += cell.power;
                }

                // Çizim
                ctx.fillStyle = cell.isWater ? '#0f141a' : (cell.owner === 1 ? '#a90432' : (cell.owner === 2 ? '#0066cc' : (cell.owner === 3 ? '#cc00cc' : '#1a1a20')));
                ctx.fillRect(offsetX + x * cellSize, offsetY + y * cellSize, cellSize - 1, cellSize - 1);
                if(cell.owner === 1) { ctx.strokeStyle = '#fdb912'; ctx.strokeRect(offsetX + x * cellSize, offsetY + y * cellSize, cellSize - 1, cellSize - 1); }
            }
        }
        
        // AGRESİF BOTLAR
        [2, 3].forEach(botId => {
            for(let i=0; i<3; i++) { // Her döngüde 3 saldırı denemesi
                let rx = Math.floor(Math.random()*gridCount), ry = Math.floor(Math.random()*gridCount);
                handleAction(rx, ry, botId);
            }
        });

        pScoreTxt.innerText = Math.floor(pTotal);
        eScoreTxt.innerText = Math.floor(eTotal);
        setTimeout(() => requestAnimationFrame(gameLoop), 50); // 50ms hızında yenileme
    }
</script>
</body>
</html>
